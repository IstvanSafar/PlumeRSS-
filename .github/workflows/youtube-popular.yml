name: Update YouTube Popular Channels

on:
  schedule:
    - cron: '0 4 * * *'  # minden nap 4:00 UTC
  workflow_dispatch:      # kézi futtatás is lehetséges

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch YouTube popular channels
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_youtube_popular.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube_popular.json
          git diff --staged --quiet || (git commit -m "chore: update YouTube popular channels" && git pull --rebase && git push)
